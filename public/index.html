<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Incident Management System - Mpumalanga Province</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sa-green': '#007A4D',
                        'sa-gold': '#FFB81C',
                        'sa-blue': '#002395',
                        'sa-red': '#DE3831',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #007A4D 0%, #002395 100%);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [incidents, setIncidents] = useState([
                { id: 1, type: 'Accident', location: 'N4 Highway km 25', status: 'Active', severity: 'High', time: '14:30', responders: 3 },
                { id: 2, type: 'Vehicle Breakdown', location: 'R40 Nelspruit', status: 'Resolved', severity: 'Low', time: '13:15', responders: 1 },
                { id: 3, type: 'Road Debris', location: 'R36 White River', status: 'In Progress', severity: 'Medium', time: '15:45', responders: 2 },
            ]);
            const [chatOpen, setChatOpen] = useState(false);

            const DashboardTab = () => (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div className="bg-white rounded-lg shadow-lg p-6 border-l-4 border-sa-red">
                            <div className="flex items-center">
                                <i className="fas fa-exclamation-triangle text-3xl text-sa-red mr-4"></i>
                                <div>
                                    <p className="text-sm font-medium text-gray-600">Active Incidents</p>
                                    <p className="text-3xl font-bold text-gray-900">7</p>
                                </div>
                            </div>
                        </div>
                        <div className="bg-white rounded-lg shadow-lg p-6 border-l-4 border-sa-gold">
                            <div className="flex items-center">
                                <i className="fas fa-users text-3xl text-sa-gold mr-4"></i>
                                <div>
                                    <p className="text-sm font-medium text-gray-600">Responders</p>
                                    <p className="text-3xl font-bold text-gray-900">24</p>
                                </div>
                            </div>
                        </div>
                        <div className="bg-white rounded-lg shadow-lg p-6 border-l-4 border-sa-green">
                            <div className="flex items-center">
                                <i className="fas fa-road text-3xl text-sa-green mr-4"></i>
                                <div>
                                    <p className="text-sm font-medium text-gray-600">Roads Monitored</p>
                                    <p className="text-3xl font-bold text-gray-900">156</p>
                                </div>
                            </div>
                        </div>
                        <div className="bg-white rounded-lg shadow-lg p-6 border-l-4 border-sa-blue">
                            <div className="flex items-center">
                                <i className="fas fa-clock text-3xl text-sa-blue mr-4"></i>
                                <div>
                                    <p className="text-sm font-medium text-gray-600">Avg Response Time</p>
                                    <p className="text-3xl font-bold text-gray-900">12 min</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-lg shadow-lg">

                                <h3 className="text-lg font-semibold text-gray-900">Live Incident Map</h3>
                            </div>
                            <div className="p-6">
                                <div className="bg-gray-100 rounded-lg h-64 flex items-center justify-center">
                                    <div className="text-center">
                                        <i className="fas fa-map text-4xl text-gray-400 mb-2"></i>
                                        <p className="text-gray-600">Interactive Map Loading...</p>
                                        <p className="text-sm text-gray-500">Showing Mpumalanga road network</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-lg shadow-lg">
                            <div className="px-6 py-4 border-b border-gray-200">
                                <h3 className="text-lg font-semibold text-gray-900">Recent Incidents</h3>
                            </div>
                            <div className="p-6">
                                <div className="space-y-4">
                                    {incidents.map(incident => (
                                        <div key={incident.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                            <div className="flex items-center space-x-3">
                                                <div className={`w-3 h-3 rounded-full ${
                                                    incident.severity === 'High' ? 'bg-red-500' :
                                                    incident.severity === 'Medium' ? 'bg-yellow-500' : 'bg-green-500'
                                                }`}></div>
                                                <div>
                                                    <p className="font-medium text-gray-900">{incident.type}</p>
                                                    <p className="text-sm text-gray-600">{incident.location}</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-sm font-medium text-gray-900">{incident.time}</p>
                                                <p className={`text-xs ${
                                                    incident.status === 'Active' ? 'text-red-600' :
                                                    incident.status === 'In Progress' ? 'text-yellow-600' : 'text-green-600'
                                                }`}>{incident.status}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-lg shadow-lg">
                        <div className="px-6 py-4 border-b border-gray-200">
                            <h3 className="text-lg font-semibold text-gray-900">Weather & Traffic Conditions</h3>
                        </div>
                        <div className="p-6">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="text-center">
                                    <i className="fas fa-sun text-3xl text-yellow-500 mb-2"></i>
                                    <p className="font-medium">Weather</p>
                                    <p className="text-sm text-gray-600">Clear, 23°C</p>
                                </div>
                                <div className="text-center">
                                    <i className="fas fa-traffic-light text-3xl text-green-500 mb-2"></i>
                                    <p className="font-medium">Traffic Flow</p>
                                    <p className="text-sm text-gray-600">Moderate</p>
                                </div>
                                <div className="text-center">
                                    <i className="fas fa-eye text-3xl text-blue-500 mb-2"></i>
                                    <p className="font-medium">Visibility</p>
                                    <p className="text-sm text-gray-600">Good (10km)</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const IncidentsTab = () => (
                <div className="space-y-6">
                    <div className="bg-white rounded-lg shadow-lg">
                        <div className="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                            <h3 className="text-lg font-semibold text-gray-900">Incident Management</h3>
                            <button className="bg-sa-green text-white px-4 py-2 rounded-lg hover:bg-green-700 transition duration-200">
                                <i className="fas fa-plus mr-2"></i>New Incident
                            </button>
                        </div>
                        <div className="p-6">
                            <div className="overflow-x-auto">
                                <table className="min-w-full">
                                    <thead>
                                        <tr className="border-b">
                                            <th className="text-left py-3 px-4">ID</th>
                                            <th className="text-left py-3 px-4">Type</th>
                                            <th className="text-left py-3 px-4">Location</th>
                                            <th className="text-left py-3 px-4">Status</th>
                                            <th className="text-left py-3 px-4">Severity</th>
                                            <th className="text-left py-3 px-4">Responders</th>
                                            <th className="text-left py-3 px-4">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {incidents.map(incident => (
                                            <tr key={incident.id} className="border-b hover:bg-gray-50">
                                                <td className="py-3 px-4">#{incident.id.toString().padStart(4, '0')}</td>
                                                <td className="py-3 px-4">{incident.type}</td>
                                                <td className="py-3 px-4">{incident.location}</td>
                                                <td className="py-3 px-4">
                                                    <span className={`px-2 py-1 rounded-full text-xs ${
                                                        incident.status === 'Active' ? 'bg-red-100 text-red-800' :
                                                        incident.status === 'In Progress' ? 'bg-yellow-100 text-yellow-800' :
                                                        'bg-green-100 text-green-800'
                                                    }`}>
                                                        {incident.status}
                                                    </span>
                                                </td>
                                                <td className="py-3 px-4">
                                                    <span className={`px-2 py-1 rounded-full text-xs ${
                                                        incident.severity === 'High' ? 'bg-red-100 text-red-800' :
                                                        incident.severity === 'Medium' ? 'bg-yellow-100 text-yellow-800' :
                                                        'bg-green-100 text-green-800'
                                                    }`}>
                                                        {incident.severity}
                                                    </span>
                                                </td>
                                                <td className="py-3 px-4">{incident.responders}</td>
                                                <td className="py-3 px-4">
                                                    <button className="text-blue-600 hover:text-blue-800 mr-2">
                                                        <i className="fas fa-edit"></i>
                                                    </button>
                                                    <button className="text-green-600 hover:text-green-800">
                                                        <i className="fas fa-eye"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );

                        <div className="bg-white rounded-lg shadow-lg p-6">
                            <h3 className="text-lg font-semibold text-gray-900 mb-4">Safety Audit Reports</h3>
                            <div className="space-y-2">
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Completed</span>
                                    <span className="font-medium">24</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Pending</span>
                                    <span className="font-medium">8</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Overdue</span>
                                    <span className="font-medium text-red-600">3</span>
                                </div>
                            </div>
                        </div>

                            <h3 className="text-lg font-semibold text-gray-900 mb-4">Analytics Overview</h3>
                            <div className="space-y-2">
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Incident Trend</span>
                                    <span className="font-medium text-green-600">↓ 12%</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Response Time</span>
                                    <span className="font-medium text-green-600">↓ 8%</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Resolution Rate</span>
                                    <span className="font-medium text-green-600">↑ 15%</span>
                                </div>
                            </div>
                        </div>
                        <div className="bg-white rounded-lg shadow-lg p-6">

                            <div className="space-y-2">
                                <div
